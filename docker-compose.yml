services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    hostname: zookeeper
    container_name: zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat"
    networks:
      - txn-network
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 30s
      timeout: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    hostname: kafka
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - txn-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: txn-analytics-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - txn-network

  mongo:
    image: mongo:7.0
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: txn_analytics
    volumes:
      - mongo_data:/data/db
    networks:
      - txn-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  producer:
    build:
      context: .
      dockerfile: infra/Dockerfile.producer
    container_name: txn-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: transactions
      TARGET_TPS: "1000"
      LOG_LEVEL: INFO
    networks:
      - txn-network

  consumer:
    build:
      context: .
      dockerfile: infra/Dockerfile.consumer
    container_name: txn-consumer
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_ENRICHED_TOPIC: transactions_enriched
      KAFKA_ANOMALY_TOPIC: anomalies
      MONGO_URI: "mongodb://mongo:27017"
      MONGO_DB: txn_analytics
      LOG_LEVEL: INFO
    networks:
      - txn-network

  daily-spend-consumer:
    build:
      context: .
      dockerfile: infra/Dockerfile.consumer
    container_name: txn-daily-spend-consumer
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_DAILY_SPEND_TOPIC: daily_spend
      MONGO_URI: "mongodb://mongo:27017"
      MONGO_DB: txn_analytics
      LOG_LEVEL: INFO
    command: ["python", "-m", "consumers.daily_spend_sink"]
    networks:
      - txn-network

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    container_name: txn-api
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: "mongodb://mongo:27017"
      MONGO_DB: txn_analytics
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    networks:
      - txn-network

  # -----------------------------------------------------------------------
  # Apache Flink (stream processing)
  # -----------------------------------------------------------------------
  flink-jobmanager:
    build:
      context: .
      dockerfile: infra/Dockerfile.flink
    container_name: flink-jobmanager
    restart: unless-stopped
    ports:
      - "8082:8081"    # Flink Web UI
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        state.backend: hashmap
        state.checkpoints.dir: file:///tmp/flink-checkpoints
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - txn-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  flink-taskmanager:
    build:
      context: .
      dockerfile: infra/Dockerfile.flink
    container_name: flink-taskmanager
    restart: unless-stopped
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.backend: hashmap
        state.checkpoints.dir: file:///tmp/flink-checkpoints
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    networks:
      - txn-network

  flink-job-submit:
    build:
      context: .
      dockerfile: infra/Dockerfile.flink
    container_name: flink-job-submit
    restart: "no"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_SOURCE_TOPIC: transactions
      KAFKA_SINK_TOPIC: transactions_enriched
      KAFKA_ANOMALY_TOPIC: anomalies
      KAFKA_DAILY_SPEND_TOPIC: daily_spend
      FLINK_PARALLELISM: "2"
      ANOMALY_SD_THRESHOLD: "3.0"
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.address: flink-jobmanager
    command: >
      bash -c "
        echo 'Waiting for Flink cluster …' &&
        until curl -sf http://flink-jobmanager:8081/overview; do sleep 3; done &&
        echo 'Submitting PyFlink job …' &&
        flink run --python /opt/flink/jobs/streaming/processor.py
      "
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - txn-network

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile.airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt_models:/opt/dbt_models
    ports:
      - "8081:8080"
    command: airflow standalone
    depends_on:
      - mongo
    networks:
      - txn-network

  dashboard:
    build:
      context: .
      dockerfile: infra/Dockerfile.dashboard
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=txn_analytics
    ports:
      - "8501:8501"
    depends_on:
      - mongo
    networks:
      - txn-network

volumes:
  mongo_data:

networks:
  txn-network:
    driver: bridge
